name: Update Formula

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (without v prefix, e.g. 0.3.0)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set version
        id: vars
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          # Strip leading 'v' if present
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          curl -sL "https://github.com/luno/luno-mcp/releases/download/v${{ steps.vars.outputs.version }}/checksums.txt" \
            -o checksums.txt
          cat checksums.txt

      - name: Extract SHAs
        id: shas
        run: |
          echo "darwin_arm64=$(grep darwin-arm64 checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "darwin_amd64=$(grep darwin-amd64 checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(grep linux-arm64 checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(grep linux-amd64 checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/luno-mcp.rb
          sed -i "s/PLACEHOLDER_DARWIN_ARM64_SHA256/${{ steps.shas.outputs.darwin_arm64 }}/" Formula/luno-mcp.rb
          sed -i "s/PLACEHOLDER_DARWIN_AMD64_SHA256/${{ steps.shas.outputs.darwin_amd64 }}/" Formula/luno-mcp.rb
          sed -i "s/PLACEHOLDER_LINUX_ARM64_SHA256/${{ steps.shas.outputs.linux_arm64 }}/" Formula/luno-mcp.rb
          sed -i "s/PLACEHOLDER_LINUX_AMD64_SHA256/${{ steps.shas.outputs.linux_amd64 }}/" Formula/luno-mcp.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/luno-mcp.rb
          git commit -m "luno-mcp ${{ steps.vars.outputs.version }}"
          git push
